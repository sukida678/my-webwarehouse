<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的专属导航页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: url('https://github.com/sukida678/my-webwarehouse/blob/fc39aad358e5f9a4b8b3405b5ddc8eacd0aa5797/20230527_00262883.png.jpg') center/cover fixed;
            padding: 50px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .link-item {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .link-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.3);
        }
        .link-item a {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的常用网站</h1>
        <div class="link-grid">
            <div class="link-item"><a href="https://github.com" target="_blank">GitHub</a></div>
            <div class="link-item"><a href="https://www.bilibili.com" target="_blank">B站</a></div>
            <div class="link-item"><a href="https://www.doubao.com" target="_blank">豆包</a></div>
            <div class="link-item"><a href="https://www.yangshipin.cn" target="_blank">央视频</a></div>
            <div class="link-item"><a href="https://www.natfrp.com" target="_blank">樱花</a></div>
            <div class="link-item"><a href="https://mail.qq.com" target="_blank">QQ邮箱</a></div>
        </div>
    </div>
</body>
</html>
